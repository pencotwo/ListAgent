<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>ListAgent HTTP Server 測試</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3344;
      --accent: #818cf8;
      --accent-light: rgba(129, 140, 248, 0.1);
      --text: #e5e7eb;
      --muted: #6b7280;
      --success: #86efac;
      --error: #fca5a5;
      --warn: #fde68a;
      --mono: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --sans: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .server-addr { font-family: var(--mono); color: var(--accent); }
    .topbar {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .topbar .subtitle { flex: 1; margin-bottom: 0; padding-top: 6px; }
    .topbar details.card.health-inline {
      margin-bottom: 0;
      padding: 8px 14px;
      flex: 0 0 auto;
      min-width: 180px;
    }
    .topbar details.card.health-inline .row { margin-bottom: 0; }
    .topbar details.card.health-inline[open] .row { margin-top: 10px; margin-bottom: 10px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted); margin-bottom: 14px;
    }
    details.card > summary.card-title {
      cursor: pointer;
      user-select: none;
      list-style: none;
      margin-bottom: 0;
      padding: 2px 0;
    }
    details.card[open] > summary.card-title { margin-bottom: 14px; }
    details.card > summary.card-title::-webkit-details-marker { display: none; }
    details.card > summary.card-title::before {
      content: '▸';
      display: inline-block;
      width: 14px;
      transition: transform 0.15s ease;
    }
    details.card[open] > summary.card-title::before { transform: rotate(90deg); }
    .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    input, textarea {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--sans); font-size: 13px;
      padding: 8px 10px; outline: none; width: 100%; transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { font-family: var(--mono); font-size: 12px; resize: vertical; min-height: 72px; }
    .btn {
      padding: 8px 18px; border-radius: 6px; border: none;
      font-family: var(--sans); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6366f1; }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .url-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
    .url-display {
      font-family: var(--mono); font-size: 12px; color: var(--accent);
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; word-break: break-all; margin-bottom: 10px; min-height: 36px;
    }
    .response-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; font-family: var(--mono); font-size: 12px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all; min-height: 56px; color: var(--muted);
    }
    .response-box.ok  { color: var(--success); border-color: rgba(134,239,172,0.3); }
    .response-box.err { color: var(--error);   border-color: rgba(252,165,165,0.3); }
    .response-box.warn{ color: var(--warn);    border-color: rgba(253,230,138,0.3); }
    .res-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: var(--muted); min-height: 20px; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px;
      font-family: var(--mono);
    }
    .badge-ok  { background: rgba(134,239,172,0.15); color: var(--success); }
    .badge-err { background: rgba(252,165,165,0.15); color: var(--error); }
    .badge-net { background: rgba(253,230,138,0.15); color: var(--warn); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .tab {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .tab.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }
    #get-message { font-family: var(--sans); font-size: 13px; min-height: 56px; }
    .card-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .card-title-row .card-title { margin-bottom: 0; }
    .btn-ghost {
      padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .history-list { display: flex; flex-direction: column; gap: 4px; }
    .history-item {
      display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px;
      border-radius: 5px; background: var(--bg); font-size: 11px;
      font-family: var(--mono); cursor: pointer; border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--border); }
    .h-time { color: var(--muted); flex-shrink: 0; padding-top: 1px; }
    .h-method {
      color: var(--accent); padding: 1px 5px; background: var(--accent-light);
      border-radius: 3px; flex-shrink: 0; font-size: 10px; margin-top: 1px;
    }
    .h-url { color: var(--accent); flex: 1; overflow: hidden; }
    .h-url .url-raw,
    .autolist-item .a-url .url-raw { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .h-url .url-decoded,
    .autolist-item .a-url .url-decoded {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--muted); font-size: 10px; margin-top: 2px;
    }
    .autolist-item .a-url .url-agent {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text); font-size: 11px; margin-top: 3px; font-family: var(--sans);
      font-weight: 600;
    }
    .autolist { display: flex; flex-direction: column; gap: 4px; }
    .autolist-item {
      display: flex; flex-direction: column; padding: 6px 8px;
      border-radius: 5px; background: var(--bg); font-size: 11px;
      font-family: var(--mono); border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .autolist-item:hover { border-color: var(--border); }
    .autolist-row { display: flex; align-items: flex-start; gap: 8px; }
    .autolist-detail {
      margin-top: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text);
      max-height: 400px;
      overflow-y: auto;
    }
    .autolist-detail.hidden { display: none; }
    .autolist-detail .d-section { margin-bottom: 8px; }
    .autolist-detail .d-section:last-child { margin-bottom: 0; }
    .autolist-detail .d-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      color: var(--muted); letter-spacing: 0.4px; margin-bottom: 3px;
    }
    .autolist-detail .d-row { display: flex; gap: 6px; align-items: baseline; }
    .autolist-detail .d-label { color: var(--muted); flex-shrink: 0; min-width: 88px; }
    .autolist-detail .d-value { color: var(--text); word-break: break-all; }
    .autolist-detail .d-preview {
      background: var(--bg); border-radius: 4px; padding: 6px 8px; margin-top: 4px;
      white-space: pre-wrap; font-family: var(--sans); color: var(--text);
    }
    .autolist-detail a.d-link { color: var(--accent); text-decoration: underline; }
    .autolist-item .a-url { color: var(--accent); flex: 1; overflow: hidden; cursor: pointer; }
    .autolist-item .a-del,
    .autolist-item .a-run {
      color: var(--muted); background: transparent; border: none;
      cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 12px;
    }
    .autolist-item .a-run:hover { color: var(--accent); background: var(--accent-light); }
    .autolist-item .a-del:hover { color: var(--error); background: rgba(252,165,165,0.1); }
    .autolist-item .a-status { font-size: 10px; font-family: var(--mono); padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
    .autolist-item .a-status.ok  { background: rgba(134,239,172,0.15); color: var(--success); }
    .autolist-item .a-status.err { background: rgba(252,165,165,0.15); color: var(--error); }
    .autolist-item .a-status.pending { background: rgba(253,230,138,0.15); color: var(--warn); }
    .autolist-item .a-agent-status {
      font-size: 10px; font-family: var(--mono); padding: 1px 6px; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); color: var(--muted);
    }
    .autolist-item .a-agent-status.running { background: rgba(134,239,172,0.15); color: var(--success); }
    .autolist-item .a-agent-status.queued  { background: rgba(253,230,138,0.15); color: var(--warn); }
    .autolist-item .a-agent-status.idle    { background: rgba(255,255,255,0.05); color: var(--muted); }
    .autolist-item .a-agent-status.err     { background: rgba(252,165,165,0.15); color: var(--error); }
    .autolist-empty { color: var(--muted); font-size: 12px; padding: 6px 8px; }
  </style>
</head>
<body>
  <h1>🛜 ListAgent HTTP Server 測試</h1>
  <div class="topbar">
    <p class="subtitle">伺服器位址：<span class="server-addr">http://127.0.0.1:37123</span></p>
    <details class="card health-inline">
      <summary class="card-title">Health Check</summary>
      <div class="row">
        <button class="btn btn-primary" id="btn-health">GET /health</button>
        <button class="btn btn-secondary" id="btn-status">📊 查詢 Agent 狀態</button>
      </div>
      <div class="res-header" id="health-header"></div>
      <div class="response-box" id="health-res">（尚未送出）</div>
    </details>
  </div>

  <!-- Auto List -->
  <div class="card">
    <div class="card-title-row">
      <div class="card-title">AUTO LIST</div>
      <div style="display:flex;gap:6px">
        <button class="btn-ghost" id="btn-autolist-refresh-status">🔄 更新狀態</button>
        <button class="btn-ghost" id="btn-autolist-run-all">▶ 全部執行</button>
      </div>
    </div>
    <div class="autolist" id="autolist"></div>
  </div>

  <!-- Send Input -->
  <div class="card">
    <div class="card-title">送出 Input 給 Agent</div>
    <div class="tabs">
      <button class="tab active" id="tab-get">GET</button>
      <button class="tab" id="tab-post">POST</button>
    </div>

    <!-- GET Panel -->
    <div id="panel-get" class="panel active">
      <div class="row">
        <div class="field" style="flex:2">
          <label>agent_id</label>
          <div style="display:flex;gap:6px;align-items:stretch">
            <input id="get-agent" type="text" placeholder="例如：ag_a1b2c3d4e5f6" style="flex:1" list="agents-datalist" />
            <button class="btn btn-secondary" id="btn-fetch-agents" type="button" title="從 ListAgent App 拉取所有 agent 清單">🔄</button>
          </div>
          <datalist id="agents-datalist"></datalist>
        </div>
        <div class="field">
          <label>arg1</label>
          <input id="get-arg1" type="text" placeholder="（選填）" />
        </div>
        <div class="field">
          <label>arg2</label>
          <input id="get-arg2" type="text" placeholder="（選填）" />
        </div>
        <div class="field">
          <label>arg3</label>
          <input id="get-arg3" type="text" placeholder="（選填）" />
        </div>
      </div>
      <div class="row">
        <div class="field" style="flex:3">
          <label>message</label>
          <textarea id="get-message" placeholder="（選填，可多行）"></textarea>
        </div>
      </div>
      <div class="row">
        <div class="field" style="flex:3">
          <label>額外自訂參數（key=value，一行一個）</label>
          <textarea id="get-extra" placeholder="tag=first&#10;category=news"></textarea>
        </div>
      </div>
      <div class="url-label">預覽 URL</div>
      <div id="get-url-preview" class="url-display">（填入 agent 名稱後預覽）</div>
      <div class="row">
        <button class="btn btn-primary" id="btn-get-send">送出 GET</button>
        <button class="btn btn-secondary" id="btn-get-copy">複製 URL</button>
        <button class="btn btn-secondary" id="btn-get-open">瀏覽器開啟</button>
        <button class="btn btn-secondary" id="btn-get-add">＋ ADD</button>
      </div>
    </div>

    <!-- POST Panel -->
    <div id="panel-post" class="panel">
      <div class="row">
        <div class="field">
          <label>agent_id</label>
          <input id="post-agent" type="text" placeholder="例如：ag_a1b2c3d4e5f6" list="agents-datalist" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>parameters（JSON 物件）</label>
          <textarea id="post-body" placeholder='{"arg1": "hello", "arg2": "world"}'></textarea>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-primary" id="btn-post-send">送出 POST</button>
        <button class="btn btn-secondary" id="btn-post-example">填入範例</button>
      </div>
    </div>

    <hr class="divider" />
    <div class="res-header" id="input-header"></div>
    <div class="response-box" id="input-res">（尚未送出）</div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title-row">
      <div class="card-title">請求歷史</div>
      <button class="btn-ghost" id="btn-clear-history">清除</button>
    </div>
    <div class="history-list" id="history-list">
      <span style="color:var(--muted);font-size:12px">尚無歷史</span>
    </div>
  </div>

<script>
const BASE = 'http://127.0.0.1:37123'
const HISTORY_URL = BASE + '/agent_test_history'
const AUTOLIST_URL = BASE + '/agent_test_autolist'

// 歷史存到使用者目錄的 ~/.agent_test/agent_test.json；頁面載入時從 server GET，變更後 POST 回去。
const reqHistory = []
let historyLoaded = false

// Auto list：存到 ~/.agent_test/agent_test_autolist.json
const autoList = []
let autoListLoaded = false

// 快取：agent_id → name（由 list_agents 填入，用於解析 auto list item 的 name）
const agentsById = {}
const agentIdsByName = {}

// ── 工具函式 ──────────────────────────────────────────────────

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  })
}

/** 把 URL 裡的 %XX 序列解碼；失敗（單獨 %）就回原文 */
function decodeUrlSafe(url) {
  try { return decodeURI(url) } catch (_) {}
  try { return decodeURIComponent(url) } catch (_) {}
  // 手動：整段逐字元試 decodeURIComponent
  return url.replace(/(?:%[0-9A-Fa-f]{2})+/g, function(seq) {
    try { return decodeURIComponent(seq) } catch (_) { return seq }
  })
}

/** 產生唯一 exec_id：時間戳 + 隨機碼，方便追蹤 request → agent execution */
function generateExecId() {
  return 'e' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8)
}

function agentNameKey(name) {
  return String(name || '').trim().toLowerCase()
}

function resolveAgentInput(raw) {
  const value = String(raw || '').trim()
  if (!value) return { agent: '', agentId: '' }
  if (value.startsWith('ag_')) {
    return { agent: agentsById[value] || '', agentId: value }
  }
  const agentId = agentIdsByName[agentNameKey(value)] || ''
  return { agent: value, agentId: agentId }
}

function urlWithAgentId(url, agentId) {
  if (!url || !agentId) return url
  try {
    const u = new URL(url)
    u.searchParams.delete('agent')
    u.searchParams.set('agent_id', agentId)
    return u.toString()
  } catch (_) {
    return url
  }
}

function agentFromUrl(url) {
  try {
    const u = new URL(url)
    return {
      agent: u.searchParams.get('agent') || '',
      agentId: u.searchParams.get('agent_id') || '',
    }
  } catch (_) {
    return { agent: '', agentId: '' }
  }
}

function normalizeAutoListItemAgent(item) {
  const fromUrl = agentFromUrl(item.url)
  const agentId = item.agentId || fromUrl.agentId || agentIdsByName[agentNameKey(item.agent || fromUrl.agent)] || ''
  const agent = item.agent || (agentId ? agentsById[agentId] || '' : fromUrl.agent)
  let changed = false
  if (agentId && item.agentId !== agentId) {
    item.agentId = agentId
    changed = true
  }
  if (agent && item.agent !== agent) {
    item.agent = agent
    changed = true
  }
  if (agentId) {
    const normalizedUrl = urlWithAgentId(item.url, agentId)
    if (normalizedUrl !== item.url) {
      item.url = normalizedUrl
      changed = true
    }
  }
  return changed
}

/** 把一個現成 URL 的 exec_id 換成新的（沒有就加）；用於 auto list 重跑時 refresh id */
function urlWithFreshExecId(url) {
  try {
    const u = new URL(url)
    u.searchParams.set('exec_id', generateExecId())
    return u.toString()
  } catch (_) {
    // fallback：簡單處理
    return url + (url.includes('?') ? '&' : '?') + 'exec_id=' + generateExecId()
  }
}

function buildGetUrl() {
  const resolvedAgent = resolveAgentInput(document.getElementById('get-agent').value)
  if (!resolvedAgent.agent && !resolvedAgent.agentId) return null
  const p = new URLSearchParams()
  if (resolvedAgent.agentId) p.set('agent_id', resolvedAgent.agentId)
  else p.set('agent', resolvedAgent.agent)
  p.set('action', 'run')
  p.set('exec_id', generateExecId())
  const a1 = document.getElementById('get-arg1').value.trim()
  const a2 = document.getElementById('get-arg2').value.trim()
  const a3 = document.getElementById('get-arg3').value.trim()
  if (a1) p.set('arg1', a1)
  if (a2) p.set('arg2', a2)
  if (a3) p.set('arg3', a3)
  const msg = document.getElementById('get-message').value.trim()
  if (msg) p.set('message', msg)
  document.getElementById('get-extra').value.trim().split('\n').forEach(function(line) {
    const eq = line.indexOf('=')
    if (eq > 0) {
      const k = line.slice(0, eq).trim()
      const v = line.slice(eq + 1).trim()
      if (k) p.append(k, v)
    }
  })
  return BASE + '/input?' + p.toString()
}

function updateUrlPreview() {
  const url = buildGetUrl()
  document.getElementById('get-url-preview').textContent = url || '（填入 agent 名稱後預覽）'
}

function setResponse(headerId, bodyId, status, text) {
  const headerEl = document.getElementById(headerId)
  const bodyEl   = document.getElementById(bodyId)
  const isOk = status >= 200 && status < 300
  const badge = document.createElement('span')
  badge.className = 'badge ' + (isOk ? 'badge-ok' : 'badge-err')
  badge.textContent = status
  headerEl.innerHTML = ''
  headerEl.appendChild(badge)
  headerEl.appendChild(document.createTextNode(' ' + new Date().toLocaleTimeString('zh-TW', { hour12: false })))
  bodyEl.className = 'response-box ' + (isOk ? 'ok' : 'err')
  try {
    bodyEl.textContent = JSON.stringify(JSON.parse(text), null, 2)
  } catch (_) {
    bodyEl.textContent = text
  }
}

function setNetError(headerId, bodyId, err) {
  const headerEl = document.getElementById(headerId)
  const bodyEl   = document.getElementById(bodyId)
  headerEl.innerHTML = '<span class="badge badge-net">NET ERR</span> ' +
    new Date().toLocaleTimeString('zh-TW', { hour12: false })
  bodyEl.className = 'response-box warn'
  bodyEl.textContent = '網路錯誤：' + err.message + '\n（確認 ListAgent App 已開啟）'
}

function saveHistory() {
  if (!historyLoaded) return  // avoid overwriting file before initial load finishes
  fetch(HISTORY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(reqHistory),
  }).catch(function() { /* 無 App 執行時忽略 */ })
}

function saveAutoList() {
  if (!autoListLoaded) return
  fetch(AUTOLIST_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(autoList),
  }).catch(function() {})
}

function loadAutoList() {
  return fetch(AUTOLIST_URL).then(function(r) { return r.json() }).then(function(arr) {
    if (Array.isArray(arr)) {
      autoList.length = 0
      arr.forEach(function(x) {
        // 遷移舊資料：若 agent 值是 ag_ 開頭，其實是 agentId
        if (x.agent && !x.agentId && String(x.agent).startsWith('ag_')) {
          x.agentId = x.agent
          x.agent = ''
        }
        autoList.push(x)
      })
    }
    autoListLoaded = true
    renderAutoList()
  }).catch(function() {
    autoListLoaded = true
    renderAutoList()
  })
}

function renderAutoList() {
  const el = document.getElementById('autolist')
  if (autoList.length === 0) {
    el.innerHTML = '<div class="autolist-empty">尚無項目。填好 GET 表單，按 ADD 新增。</div>'
    return
  }
  el.innerHTML = ''
  autoList.forEach(function(item, i) {
    const container = document.createElement('div')
    container.className = 'autolist-item'
    container.dataset.index = String(i)

    // 第一列：URL / agent 徽章 / 執行 / 刪除
    const row = document.createElement('div')
    row.className = 'autolist-row'
    const url = document.createElement('span')
    url.className = 'a-url'
    const decoded = decodeUrlSafe(item.url)
    const agentName = item.agent || (item.agentId ? agentsById[item.agentId] || '' : '')
    const agentLabel = agentName
      ? escapeHtml(agentName) + (item.agentId ? ' <span style="color:var(--muted);font-size:9px">(' + escapeHtml(item.agentId) + ')</span>' : '')
      : (item.agentId
          ? '<span style="color:var(--warn)">找不到對應 Agent（' + escapeHtml(item.agentId) + '）</span>'
          : '<span style="color:var(--muted)">（無 agent 資訊）</span>')
    url.innerHTML = '<span class="url-raw">' + escapeHtml(item.url) + '</span>' +
      (decoded !== item.url ? '<span class="url-decoded">' + escapeHtml(decoded) + '</span>' : '') +
      '<span class="url-agent">👤 ' + agentLabel + '</span>'
    url.title = item.url + (decoded !== item.url ? '\n\n解碼：' + decoded : '') + (agentName ? '\n\nAgent：' + agentName : '')
    url.addEventListener('click', function() { reuseAutoList(i) })
    const agentStatus = document.createElement('span')
    agentStatus.className = 'a-agent-status idle'
    agentStatus.textContent = 'idle'
    agentStatus.title = '點擊展開／收合詳細狀態'
    agentStatus.style.cursor = 'pointer'
    agentStatus.addEventListener('click', function(e) {
      e.stopPropagation()
      const d = container.querySelector('.autolist-detail')
      if (d) d.classList.toggle('hidden')
    })
    const status = document.createElement('span')
    status.className = 'a-status'
    status.textContent = ''
    const run = document.createElement('button')
    run.className = 'a-run'
    run.textContent = '▶'
    run.title = '執行 GET'
    run.addEventListener('click', function(e) {
      e.stopPropagation()
      runAutoListItem(i)
    })
    const del = document.createElement('button')
    del.className = 'a-del'
    del.textContent = '✕'
    del.title = '刪除'
    del.addEventListener('click', function(e) {
      e.stopPropagation()
      autoList.splice(i, 1)
      saveAutoList()
      renderAutoList()
    })
    row.appendChild(url)
    row.appendChild(agentStatus)
    row.appendChild(status)
    row.appendChild(run)
    row.appendChild(del)

    // 第二列（預設收合）：詳細狀態卡片
    const detail = document.createElement('div')
    detail.className = 'autolist-detail hidden'
    detail.innerHTML = '<div class="d-title">（尚無狀態資料，請按「🔄 更新狀態」或執行任務）</div>'

    container.appendChild(row)
    container.appendChild(detail)
    el.appendChild(container)
  })
}

function setAutoListStatus(i, cls, text) {
  const row = document.querySelector('.autolist-item[data-index="' + i + '"]')
  if (!row) return
  const s = row.querySelector('.a-status')
  if (!s) return
  s.className = 'a-status ' + cls
  s.textContent = text
}

async function runAutoListItem(i) {
  const item = autoList[i]
  if (!item || !item.url) return
  // 清空舊的 session link 附加區塊
  const oldExtra = document.getElementById('input-res-extra')
  if (oldExtra) oldExtra.remove()
  // 每次送出前產生新的 exec_id，替換 URL 裡的 exec_id 參數
  const urlToSend = urlWithFreshExecId(item.url)
  const uu = new URL(urlToSend)
  const execId = uu.searchParams.get('exec_id') || ''
  item.lastExecId = execId
  setAutoListStatus(i, 'pending', '…')
  try {
    const res = await fetch(urlToSend)
    const text = await res.text()
    setResponse('input-header', 'input-res', res.status, text)
    addHistory('GET', urlToSend)
    setAutoListStatus(i, res.ok ? 'ok' : 'err', String(res.status))
    // 啟動 poll 直到 task 完成、附加 session link
    if (res.ok && execId) {
      const name = item.agent || (item.agentId ? agentsById[item.agentId] || '' : '')
      startPollForCompletion(execId, name, item.agentId)
    }
    // 送出後立即抓一次狀態（backend 應該已把此 agent 加進 running/queued）
    if (item.agent || item.agentId) refreshAutoListAgentStatus()
  } catch (err) {
    setNetError('input-header', 'input-res', err)
    setAutoListStatus(i, 'err', 'NET')
  }
}

async function runAllAutoList() {
  for (let i = 0; i < autoList.length; i++) {
    await runAutoListItem(i)
  }
}

/** 抓所有 auto list 條目的 agent 目前狀態並更新徽章。
 *  只送一次 GET /input?action=get_status（不帶 agent，回全部 snapshot），
 *  然後在前端逐項對應。 */
async function refreshAutoListAgentStatus() {
  if (autoList.length === 0) return
  let snapshot
  try {
    const res = await fetch(BASE + '/input?action=get_status')
    if (!res.ok) throw new Error('HTTP ' + res.status)
    snapshot = await res.json()
  } catch (err) {
    // 全部標成 ERR
    document.querySelectorAll('.autolist-item .a-agent-status').forEach(function(b) {
      b.classList.remove('running', 'queued', 'idle')
      b.classList.add('err')
      b.textContent = 'ERR'
      b.title = String(err)
    })
    return
  }
  const runningSet = new Set(Array.isArray(snapshot.running) ? snapshot.running : [])
  const queuedMap = (snapshot.queued && typeof snapshot.queued === 'object') ? snapshot.queued : {}
  const detailMap = (snapshot.detail && typeof snapshot.detail === 'object') ? snapshot.detail : {}
  document.querySelectorAll('.autolist-item').forEach(function(row) {
    const i = Number(row.dataset.index)
    const item = autoList[i]
    if (!item) return
    const badge = row.querySelector('.a-agent-status')
    const detailBox = row.querySelector('.autolist-detail')
    if (!badge) return
    const name = item.agent || (item.agentId ? agentsById[item.agentId] || '' : '')
    if (!name) {
      badge.classList.remove('running', 'queued', 'idle', 'err')
      badge.classList.add('idle')
      badge.textContent = item.agentId ? 'id?' : '—'
      if (detailBox) {
        detailBox.innerHTML = '<div class="d-title">狀態：找不到對應 Agent</div>' +
          '<div class="d-row"><span class="d-label">agent_id</span><span class="d-value">' + escapeHtml(item.agentId || '(無)') + '</span></div>' +
          '<div class="d-section" style="margin-top:6px;color:var(--muted)">此 auto list item 沒有 agent 資訊（按 🔄 更新 agents 清單試試）</div>'
      }
      return
    }
    const queued = Number(queuedMap[name] || 0)
    const running = runningSet.has(name)
    const detail = detailMap[name] || {}
    badge.classList.remove('running', 'queued', 'idle', 'err')
    const isMineRunning = !!(item.lastExecId && detail.currentExecId && item.lastExecId === detail.currentExecId)
    const isMineLast    = !!(item.lastExecId && detail.lastExecId    && item.lastExecId === detail.lastExecId)
    if (running) {
      badge.classList.add('running')
      const parts = ['running']
      if (isMineRunning) parts.push('★')
      if (detail.currentRound) parts.push('R' + detail.currentRound)
      if (detail.currentTokens) parts.push(formatTokens(detail.currentTokens))
      badge.textContent = parts.join(' ') + (queued > 0 ? ' (+' + queued + ')' : '')
    } else if (queued > 0) {
      badge.classList.add('queued')
      badge.textContent = 'queued ' + queued
    } else {
      badge.classList.add('idle')
      if (detail.lastEndedAt) {
        const mark = detail.lastSuccess ? '✓' : '✗'
        const star = isMineLast ? '★' : ''
        const tokStr = detail.lastTokens ? ' ' + formatTokens(detail.lastTokens) : ''
        badge.textContent = 'last ' + mark + star + tokStr
      } else {
        badge.textContent = 'idle'
      }
    }
    badge.title = '點擊展開／收合詳細狀態'
    // 更新可摺疊詳細資訊卡（保留展開／收合狀態）
    if (detailBox) detailBox.innerHTML = buildStatusDetailHtml(name, running, queued, detail, item.lastExecId)
  })
}

/** 建立可摺疊卡片的 HTML — 取代原本的 tooltip */
function buildStatusDetailHtml(agent, running, queued, detail, myExecId) {
  const rows = []
  rows.push('<div class="d-section">')
  rows.push('  <div class="d-title">Agent</div>')
  rows.push('  <div class="d-row"><span class="d-label">名稱</span><span class="d-value">' + escapeHtml(agent) + '</span></div>')
  if (myExecId) rows.push('  <div class="d-row"><span class="d-label">本 item exec_id</span><span class="d-value">' + escapeHtml(myExecId) + '</span></div>')
  rows.push('</div>')

  rows.push('<div class="d-section">')
  rows.push('  <div class="d-title">目前狀態</div>')
  if (running) {
    rows.push('  <div class="d-row"><span class="d-label">狀態</span><span class="d-value" style="color:var(--success)">執行中</span></div>')
    if (detail.currentRound) rows.push('  <div class="d-row"><span class="d-label">當前 Round</span><span class="d-value">' + detail.currentRound + '</span></div>')
    if (detail.currentTokens) rows.push('  <div class="d-row"><span class="d-label">累積 tokens</span><span class="d-value">' + detail.currentTokens + '</span></div>')
    if (detail.currentExecId) {
      const same = myExecId && detail.currentExecId === myExecId
      rows.push('  <div class="d-row"><span class="d-label">當前 exec_id</span><span class="d-value">' + escapeHtml(detail.currentExecId) + (same ? ' <span style="color:var(--accent)">★ 本 item</span>' : ' <span style="color:var(--muted)">(其他來源)</span>') + '</span></div>')
    }
    if (queued > 0) rows.push('  <div class="d-row"><span class="d-label">後方排隊</span><span class="d-value">' + queued + '</span></div>')
  } else if (queued > 0) {
    rows.push('  <div class="d-row"><span class="d-label">狀態</span><span class="d-value" style="color:var(--warn)">排隊中（' + queued + ' 個等待）</span></div>')
  } else {
    rows.push('  <div class="d-row"><span class="d-label">狀態</span><span class="d-value" style="color:var(--muted)">idle</span></div>')
  }
  rows.push('</div>')

  if (detail.lastEndedAt) {
    const when = new Date(detail.lastEndedAt).toLocaleString('zh-TW', { hour12: false })
    rows.push('<div class="d-section">')
    rows.push('  <div class="d-title">上一次任務</div>')
    rows.push('  <div class="d-row"><span class="d-label">結束時間</span><span class="d-value">' + when + '</span></div>')
    rows.push('  <div class="d-row"><span class="d-label">結果</span><span class="d-value" style="color:' + (detail.lastSuccess ? 'var(--success)' : 'var(--error)') + '">' + (detail.lastSuccess ? '成功 ✓' : '失敗 ✗') + '</span></div>')
    if (detail.lastExecId) {
      const same = myExecId && detail.lastExecId === myExecId
      rows.push('  <div class="d-row"><span class="d-label">exec_id</span><span class="d-value">' + escapeHtml(detail.lastExecId) + (same ? ' <span style="color:var(--accent)">★ 本 item</span>' : ' <span style="color:var(--muted)">(其他來源)</span>') + '</span></div>')
    }
    if (detail.lastRounds) rows.push('  <div class="d-row"><span class="d-label">Rounds</span><span class="d-value">' + detail.lastRounds + '</span></div>')
    if (detail.lastTokens) rows.push('  <div class="d-row"><span class="d-label">Tokens</span><span class="d-value">' + detail.lastTokens + '</span></div>')
    if (detail.lastCachedTokens !== undefined && detail.lastPromptTokens) {
      const pct = (detail.lastCachedTokens / detail.lastPromptTokens * 100).toFixed(1)
      rows.push('  <div class="d-row"><span class="d-label">Cache 命中率</span><span class="d-value">' + detail.lastCachedTokens + ' / ' + detail.lastPromptTokens + ' = ' + pct + '%</span></div>')
    }
    if (detail.lastSessionUrl) {
      rows.push('  <div class="d-row"><span class="d-label">Session</span><span class="d-value"><a class="d-link" href="' + detail.lastSessionUrl + '" target="_blank">📄 開啟 session JSON</a></span></div>')
    }
    if (detail.lastSessionPath) {
      rows.push('  <div class="d-row"><span class="d-label" style="min-width:auto">&nbsp;</span><span class="d-value" style="font-size:10px;color:var(--muted)">' + escapeHtml(detail.lastSessionPath) + '</span></div>')
    }
    if (detail.lastContentPreview) {
      rows.push('  <div class="d-title" style="margin-top:6px">回覆節錄</div>')
      rows.push('  <div class="d-preview">' + escapeHtml(detail.lastContentPreview) + '</div>')
    }
    rows.push('</div>')
  }
  return rows.join('')
}

/** 12345 → "12.3k"，簡潔顯示 */
function formatTokens(n) {
  n = Number(n) || 0
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k'
  return String(n)
}

// 追蹤剛送出但還沒完成的 request：exec_id → { agent name/id, poll timer id }
const pendingExecs = {}

/** 對指定 exec_id 開始 poll 直到 backend 回報 lastExecId 匹配，然後把 session link 附加到 response */
function startPollForCompletion(execId, agent, agentId) {
  if (!execId) return
  if (pendingExecs[execId]) return  // 已在 poll
  pendingExecs[execId] = { agent: agent, agentId: agentId, retries: 0 }
  const tick = async function() {
    if (!pendingExecs[execId]) return
    pendingExecs[execId].retries++
    if (pendingExecs[execId].retries > 300) { delete pendingExecs[execId]; return }  // 給 10 分鐘（2s * 300）
    try {
      let url = BASE + '/input?action=get_status'
      if (agent) url += '&agent=' + encodeURIComponent(agent)
      else if (agentId) url += '&agent_id=' + encodeURIComponent(agentId)
      const res = await fetch(url)
      if (res.ok) {
        const data = await res.json()
        const detail = data.detail || {}
        if (detail.lastExecId === execId) {
          // 完成了 — 附加 session link 到 response
          appendSessionLinkToResponse(detail, execId)
          delete pendingExecs[execId]
          return
        }
      }
    } catch (_) {}
    setTimeout(tick, 2000)
  }
  setTimeout(tick, 2000)
}

/** 把 session link 資訊附加到 response box（多筆同時完成會累加） */
function appendSessionLinkToResponse(detail, execId) {
  const bodyEl = document.getElementById('input-res')
  if (!bodyEl) return
  const sessionUrl = detail.lastSessionUrl || ''
  const sessionPath = detail.lastSessionPath || ''
  const tokens = detail.lastTokens || 0
  const rounds = detail.lastRounds || 0
  const success = detail.lastSuccess ? '✓ 成功' : '✗ 失敗'
  const preview = detail.lastContentPreview || ''
  const cached = detail.lastCachedTokens
  const promptTk = detail.lastPromptTokens
  const cachePct = (cached !== undefined && promptTk)
    ? '　Cache: ' + cached + '/' + promptTk + ' (' + (cached / promptTk * 100).toFixed(1) + '%)'
    : ''
  let extra = document.getElementById('input-res-extra')
  if (!extra) {
    extra = document.createElement('div')
    extra.id = 'input-res-extra'
    extra.style.marginTop = '10px'
    extra.style.paddingTop = '10px'
    extra.style.borderTop = '1px dashed var(--border)'
    bodyEl.parentNode.insertBefore(extra, bodyEl.nextSibling)
  }
  const link = sessionUrl
    ? '<a href="' + sessionUrl + '" target="_blank" style="color:var(--accent);text-decoration:underline">📄 開啟 session JSON</a>'
    : '<span style="color:var(--muted)">（無 session 檔）</span>'
  const block = document.createElement('div')
  block.style.marginBottom = '10px'
  block.style.paddingBottom = '8px'
  block.style.borderBottom = '1px dotted var(--border)'
  block.innerHTML =
    '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' +
      '<strong style="color:var(--text)">exec_id ' + execId + ' 已完成：</strong> ' + success +
      '　Rounds: ' + rounds + '　Tokens: ' + tokens + cachePct +
    '</div>' +
    '<div style="font-size:11px;color:var(--muted);word-break:break-all">' + link + '</div>' +
    (sessionPath ? '<div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono);word-break:break-all">' + sessionPath + '</div>' : '') +
    (preview ? '<div style="margin-top:8px;padding:6px 10px;background:var(--bg);border-radius:5px;font-size:12px;color:var(--text);white-space:pre-wrap">' + preview.replace(/[<>&]/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c]}) + '</div>' : '')
  extra.appendChild(block)
}

async function doStatus() {
  const val = document.getElementById('get-agent').value.trim()
  // agent 有填就查該 agent（自動辨識 agent_id vs 名稱），沒填就查全部
  let url = BASE + '/input?action=get_status'
  if (val) {
    url += val.startsWith('ag_')
      ? '&agent_id=' + encodeURIComponent(val)
      : '&agent=' + encodeURIComponent(val)
  }
  const bodyEl = document.getElementById('health-res')
  bodyEl.className = 'response-box'
  bodyEl.textContent = '查詢中…'
  try {
    const res = await fetch(url)
    const text = await res.text()
    setResponse('health-header', 'health-res', res.status, text)
    addHistory('GET', url)
  } catch (err) {
    setNetError('health-header', 'health-res', err)
  }
}

async function doGet() {
  const url = buildGetUrl()
  if (!url) { alert('請填入 agent 名稱'); return }
  // 清空舊的 session link 附加區塊
  const oldExtra = document.getElementById('input-res-extra')
  if (oldExtra) oldExtra.remove()
  const bodyEl = document.getElementById('input-res')
  bodyEl.className = 'response-box'
  bodyEl.textContent = '送出中…'
  try {
    const res  = await fetch(url)
    const text = await res.text()
    setResponse('input-header', 'input-res', res.status, text)
    addHistory('GET', url)
    // 從 URL 抓出 exec_id + agent/agent_id 啟動 poll
    if (res.ok) {
      const uu = new URL(url)
      const execId = uu.searchParams.get('exec_id') || ''
      const agentName = uu.searchParams.get('agent') || ''
      const agentId = uu.searchParams.get('agent_id') || ''
      // 用快取解析 name（若給了 agentId）
      const resolvedName = agentName || (agentId ? agentsById[agentId] || '' : '')
      startPollForCompletion(execId, resolvedName, agentId)
    }
  } catch (err) {
    setNetError('input-header', 'input-res', err)
  }
}

async function doPost() {
  const agent = document.getElementById('post-agent').value.trim()
  if (!agent) { alert('請填入 agent 名稱'); return }
  const rawBody = document.getElementById('post-body').value.trim()
  let parameters
  try {
    parameters = rawBody ? JSON.parse(rawBody) : {}
  } catch (_) {
    alert('parameters 不是有效的 JSON')
    return
  }
  const bodyEl = document.getElementById('input-res')
  bodyEl.className = 'response-box'
  bodyEl.textContent = '送出中…'
  const execId = generateExecId()
  const payloadObj = { action: 'run', exec_id: execId, parameters: parameters }
  if (agent.startsWith('ag_')) payloadObj.agent_id = agent
  else payloadObj.agent = agent
  const payload = JSON.stringify(payloadObj)
  try {
    const res  = await fetch(BASE + '/input', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: payload,
    })
    const text = await res.text()
    setResponse('input-header', 'input-res', res.status, text)
    addHistory('POST', BASE + '/input')
  } catch (err) {
    setNetError('input-header', 'input-res', err)
  }
}
